{% extends "base.html" %}

{% block head %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/user_dashboard.css') }}">
    <script src="{{ url_for('static', filename='js/user_dashboard.js') }}"></script>
    <title>User Dashboard</title>
{% endblock %}

{% block body %}
    <header class="navbar">
        <div class="logo">LUMA</div>

        <nav class="nav-links">
            <a href="#" class="active">Home</a>
            <a href="#">Order</a>
            <a href="#">About</a>
            <a href="#">Libraries</a>
            <a href="#">Latest</a>
            <a href="#">Most Rated</a>
            <a href="#">Most Watched</a>
            <a href="#">Settings</a>
        </nav>

        <div class="profile">C</div>
    </header>

<main class="container">

    <div class="search-wrapper">
        <input type="text" placeholder="Search . . .">
    </div>

    <h2 class="section-title">Most Watched</h2>

    <div class="movie-grid" id="movieGrid">
        <form action="/get_movies" method="GET">
            <input type="text" placeholder="Search . . .">
            <div class="movie-card">
                    <h3>{{ movie.image }}</h3>
                    <p>{{ movie.description }}</p>
                    <button type="button" class="details-btn">SEE MORE</button>
                </div>
                <button type="hidden" name="movie_id" value="{{ movie.id }}"></button>
            <h2>MOVIES</h2>
            <div class="movie-card">
                <h3>{{ movie.image }}</h3>
                <p>{{ movie.description }}</p>
                <button type="button" class="details-btn">SEE MORE</button>
            </div>
        </form>
    </div>
</main>
{% endblock %}
